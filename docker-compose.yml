services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_AUTH_URL: ${VITE_AUTH_URL}
        VITE_FILES_API_URL: ${VITE_FILES_API_URL}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
    container_name: rpg-public-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PUBLIC_WEB_PORT}:8080"
