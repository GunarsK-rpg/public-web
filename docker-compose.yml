services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_AUTH_URL: ${VITE_AUTH_URL}
        VITE_FILES_API_URL: ${VITE_FILES_API_URL}
    container_name: rpg-public-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8180:8080"
