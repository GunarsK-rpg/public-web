name: Cleanup PR Image

on:
  pull_request:
    types: [closed]

permissions:
  packages: write

jobs:
  cleanup:
    name: Delete PR Image
    runs-on: ubuntu-latest
    steps:
      - name: Delete ghcr.io image for PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: public-web
          TAG: pr-${{ github.event.pull_request.number }}
          ORG: ${{ github.repository_owner }}
        run: |
          VERSION_ID=$(gh api \
            "/orgs/$ORG/packages/container/$IMAGE/versions" \
            --paginate --jq \
            "[.[] | select(.metadata.container.tags != null and (.metadata.container.tags[] == \"$TAG\"))] | if length > 0 then .[0].id else empty end")

          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE "/orgs/$ORG/packages/container/$IMAGE/versions/$VERSION_ID"
            echo "Deleted $IMAGE:$TAG (version $VERSION_ID)"
          else
            echo "No image found for $IMAGE:$TAG (may not have been published)"
          fi
