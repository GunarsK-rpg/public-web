<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg7" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d1233"/>
    </radialGradient>
  </defs>

  <circle cx="256" cy="256" r="256" fill="url(#bg7)"/>

  <g transform="translate(256,256)" fill="#c9a84c" stroke="none">
    <!-- Four crescent shapes pointing inward, rotational symmetry -->
    <!-- Top crescent -->
    <path d="M -30,-140 A 80,80 0 0,1 30,-140 A 60,60 0 0,0 -30,-140 Z"/>
    <!-- Right crescent -->
    <path d="M 140,-30 A 80,80 0 0,1 140,30 A 60,60 0 0,0 140,-30 Z"/>
    <!-- Bottom crescent -->
    <path d="M 30,140 A 80,80 0 0,1 -30,140 A 60,60 0 0,0 30,140 Z"/>
    <!-- Left crescent -->
    <path d="M -140,30 A 80,80 0 0,1 -140,-30 A 60,60 0 0,0 -140,30 Z"/>
  </g>

  <g transform="translate(256,256)" fill="none" stroke="#c9a84c">
    <!-- Inner four overlapping circles - smaller, tighter -->
    <g stroke-width="3.5">
      <circle cx="0" cy="-55" r="55"/>
      <circle cx="55" cy="0" r="55"/>
      <circle cx="0" cy="55" r="55"/>
      <circle cx="-55" cy="0" r="55"/>
    </g>

    <!-- Thin outer ring -->
    <circle cx="0" cy="0" r="168" stroke-width="1.5" stroke-opacity="0.25"/>

    <!-- Diagonal accent lines connecting crescents to circles -->
    <g stroke-width="1.5" stroke-opacity="0.4">
      <line x1="-95" y1="-95" x2="-65" y2="-65"/>
      <line x1="95" y1="-95" x2="65" y2="-65"/>
      <line x1="95" y1="95" x2="65" y2="65"/>
      <line x1="-95" y1="95" x2="-65" y2="65"/>
    </g>

    <!-- Central 4-pointed star -->
    <g fill="#c9a84c" stroke="none">
      <polygon points="0,-22 6,0 0,22 -6,0"/>
      <polygon points="-22,0 0,6 22,0 0,-6"/>
    </g>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#0d1233"/>
  </g>
</svg>
