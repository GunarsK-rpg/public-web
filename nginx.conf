server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets (Vite build outputs with content hashes)
    # Note: add_header in location blocks overrides server-level headers,
    # so security headers must be repeated here
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Security headers (must be duplicated as add_header is not inherited)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://localhost:* https://*.localhost:*; font-src 'self' data:; connect-src 'self' blob: https://localhost:*; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_types text/plain text/css application/xml text/javascript application/xml+rss application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Note: X-XSS-Protection is deprecated (removed in Chrome 2019) and can introduce
    # vulnerabilities in older browsers. CSP provides modern XSS protection.
    # HSTS - CloudFront overrides this header, but set at origin for defense-in-depth
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy (CSP)
    # 'unsafe-inline' for style-src required for Quasar dynamic styles
    # Note: upgrade-insecure-requests only applies when served over HTTPS (harmless over HTTP)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://localhost:* https://*.localhost:*; font-src 'self' data:; connect-src 'self' blob: https://localhost:*; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
}
